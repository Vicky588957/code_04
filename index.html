<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>批量完成 · 弹窗演示</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #1e6cf2;
    --primary-dark: #1656c4;
    --primary-light: #e8f1ff;
    --success: #2bc48a;
    --success-light: #e6f9f1;
    --warning: #f5a623;
    --warning-light: #fff5e0;
    --danger: #f25c5c;
    --danger-light: #ffe8e8;
    --info: #8a94a6;
    --info-light: #eef0f4;
    --text-1: #1a2233;
    --text-2: #4a5568;
    --text-3: #8a94a6;
    --border: #e5e8ef;
    --border-light: #f0f2f6;
    --bg: #f5f7fb;
    --bg-elevated: #ffffff;
    --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04);
    --shadow-md: 0 4px 16px rgba(15, 23, 42, 0.06);
    --shadow-lg: 0 16px 48px rgba(15, 23, 42, 0.12);
    --radius-sm: 4px;
    --radius: 6px;
    --radius-lg: 10px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text-1);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
  }

  .trigger-wrap {
    text-align: center;
    padding: 40px;
  }
  .trigger-title {
    font-size: 20px;
    font-weight: 600;
    color: var(--text-1);
    margin-bottom: 8px;
  }
  .trigger-desc {
    font-size: 13px;
    color: var(--text-3);
    margin-bottom: 24px;
  }
  .btn {
    height: 36px;
    padding: 0 20px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    border: 1px solid transparent;
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    font-family: inherit;
    transition: all .15s ease;
    white-space: nowrap;
  }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-ghost { background: #fff; color: var(--text-1); border-color: var(--border); }
  .btn-ghost:hover { color: var(--primary); border-color: var(--primary); }

  /* ===== Modal ===== */
  .modal-mask {
    position: fixed; inset: 0;
    background: rgba(15, 23, 42, 0.45);
    display: flex; align-items: center; justify-content: center;
    z-index: 200;
    opacity: 0; pointer-events: none;
    transition: opacity .2s;
    backdrop-filter: blur(2px);
  }
  .modal-mask.open { opacity: 1; pointer-events: auto; }
  .modal {
    background: #fff;
    border-radius: 10px;
    width: 640px;
    max-width: calc(100vw - 32px);
    max-height: calc(100vh - 60px);
    display: flex; flex-direction: column;
    box-shadow: var(--shadow-lg);
    overflow: hidden;
    transform: translateY(12px) scale(0.98);
    transition: transform .25s cubic-bezier(.2,.8,.3,1);
  }
  .modal-mask.open .modal { transform: translateY(0) scale(1); }
  .modal-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border-light);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-title { font-size: 16px; font-weight: 600; color: var(--text-1); }
  .modal-title .sub { font-size: 12px; color: var(--text-3); font-weight: 400; margin-left: 8px; }
  .modal-close {
    width: 28px; height: 28px; border-radius: 4px;
    border: none; background: transparent; cursor: pointer;
    color: var(--text-3); font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    transition: all .12s;
  }
  .modal-close:hover { background: var(--info-light); color: var(--text-1); }
  .modal-body {
    padding: 20px;
    overflow-y: auto;
    flex: 1;
  }
  .modal-footer {
    padding: 12px 20px;
    border-top: 1px solid var(--border-light);
    display: flex; align-items: center; justify-content: flex-end; gap: 8px;
    background: #fafbfd;
  }

  /* Selected items preview */
  .selected-preview {
    background: #f7faff;
    border: 1px solid #dde7f7;
    border-radius: var(--radius);
    padding: 12px 14px;
    margin-bottom: 18px;
  }
  .selected-preview-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px;
    font-size: 13px;
  }
  .selected-preview-head .label { color: var(--text-2); }
  .selected-preview-head .toggle {
    color: var(--primary); cursor: pointer; font-size: 12px;
    display: inline-flex; align-items: center; gap: 2px;
  }
  .selected-preview-head .toggle .arrow {
    transition: transform .2s;
  }
  .selected-preview-head .toggle.collapsed .arrow { transform: rotate(-90deg); }
  .selected-list {
    display: flex; flex-wrap: wrap; gap: 6px;
    max-height: 120px;
    overflow-y: auto;
    transition: max-height .25s;
  }
  .selected-list.collapsed { max-height: 0; overflow: hidden; }
  .selected-chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: #fff;
    border: 1px solid #d2deef;
    border-radius: 12px;
    padding: 2px 10px;
    font-size: 12px;
    color: var(--text-1);
    max-width: 240px;
  }
  .selected-chip .idx {
    color: var(--text-3); font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
  }
  .selected-chip .text {
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* Section in modal */
  .form-section { margin-bottom: 0; }
  .section-label {
    font-size: 13px; font-weight: 500;
    color: var(--text-1);
    margin-bottom: 8px;
    display: flex; align-items: center; gap: 6px;
  }
  .section-label .required { color: var(--danger); }
  .section-label .hint { color: var(--text-3); font-weight: 400; font-size: 12px; margin-left: 4px; }
  .section-tip { font-size: 12px; color: var(--text-3); margin-top: 6px; line-height: 1.5; }

  /* Upload area */
  .upload-zone {
    border: 1.5px dashed #c4cad6;
    border-radius: var(--radius);
    background: #fafbfd;
    padding: 28px 20px;
    text-align: center;
    cursor: pointer;
    transition: all .15s;
    color: var(--text-2);
  }
  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--primary);
    background: #f4f8ff;
    color: var(--primary);
  }
  .upload-zone .upload-icon {
    width: 36px; height: 36px;
    margin: 0 auto 8px;
    border-radius: 8px;
    background: var(--primary-light);
    color: var(--primary);
    display: flex; align-items: center; justify-content: center;
  }
  .upload-zone .upload-text { font-size: 13px; margin-bottom: 4px; }
  .upload-zone .upload-text .link { color: var(--primary); font-weight: 500; }
  .upload-zone .upload-hint { font-size: 12px; color: var(--text-3); }

  .file-list { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
  .file-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    transition: all .15s;
  }
  .file-item:hover { border-color: #c8dafd; box-shadow: var(--shadow-sm); }
  .file-item .file-icon {
    width: 32px; height: 32px;
    border-radius: 6px;
    background: var(--primary-light);
    color: var(--primary);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 11px; font-weight: 600;
  }
  .file-item .file-info { flex: 1; min-width: 0; }
  .file-item .file-name {
    font-size: 13px; color: var(--text-1);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 4px;
  }
  .file-item .file-progress {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--text-3);
  }
  .progress-bar {
    flex: 1;
    height: 4px;
    background: var(--border-light);
    border-radius: 2px;
    overflow: hidden;
    position: relative;
  }
  .progress-bar .fill {
    height: 100%;
    background: var(--primary);
    width: 0;
    border-radius: 2px;
    transition: width .2s;
  }
  .progress-bar .fill.done { background: var(--success); }
  .file-item .file-remove {
    width: 22px; height: 22px;
    border-radius: 4px;
    border: none; background: transparent;
    color: var(--text-3); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .file-item .file-remove:hover { background: var(--danger-light); color: var(--danger); }
  .file-item .file-remove:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ===== Success State ===== */
  .success-wrap {
    padding: 40px 24px;
    text-align: center;
  }
  .success-icon {
    width: 64px; height: 64px;
    border-radius: 50%;
    background: var(--success-light);
    color: var(--success);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px;
    animation: pop .35s cubic-bezier(.2, 1.4, .4, 1);
  }
  @keyframes pop {
    0% { transform: scale(0.3); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  .success-title { font-size: 18px; font-weight: 600; color: var(--text-1); margin-bottom: 6px; }
  .success-desc { font-size: 13px; color: var(--text-2); margin-bottom: 24px; }
  .success-summary {
    background: #f7faff;
    border: 1px solid #dde7f7;
    border-radius: var(--radius);
    padding: 16px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    max-width: 460px;
    margin: 0 auto 8px;
  }
  .summary-item { text-align: center; }
  .summary-item .num { font-size: 24px; font-weight: 600; color: var(--primary); line-height: 1.2; }
  .summary-item .label { font-size: 12px; color: var(--text-2); margin-top: 4px; }

  /* Toast */
  .toast {
    position: fixed;
    top: 40px; left: 50%;
    transform: translateX(-50%) translateY(-12px);
    background: #1a2233;
    color: #fff;
    padding: 8px 16px;
    border-radius: 4px;
    font-size: 13px;
    box-shadow: var(--shadow-md);
    opacity: 0;
    pointer-events: none;
    transition: all .2s;
    z-index: 300;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.success { background: var(--success); }
  .toast.warn { background: var(--warning); }
  .toast.error { background: var(--danger); }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #c8cfdb; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #aab2c2; }
  ::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>
<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Batch Complete Modal -->
<div class="modal-mask" id="modalMask">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-header">
      <div class="modal-title">
        批量完成

      </div>
      <button class="modal-close" id="modalClose">×</button>
    </div>

    <!-- Form view -->
    <div class="modal-body" id="modalFormView">
      <!-- Selected items preview -->
      <div class="selected-preview" id="selectedPreview">
        <div class="selected-preview-head">
          <span class="label">本次将处理 <strong id="modalSelectedCount" style="color: var(--primary);">6</strong> 条任务</span>
          <span class="toggle" id="toggleList">
            <span>收起列表</span>
            <span class="arrow">▾</span>
          </span>
        </div>
        <div class="selected-list" id="selectedList"></div>
      </div>

      <!-- Evidence upload -->
      <div class="form-section">
        <div class="section-label">
          <span>佐证材料</span>
          <span class="required">*</span>

        </div>
        <div class="upload-zone" id="uploadZone">
          <input type="file" id="fileInput" multiple style="display:none;" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx,.xls,.xlsx" />
          <div class="upload-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="17 8 12 3 7 8"></polyline>
              <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
          </div>
          <div class="upload-text">将文件拖到此处,或<span class="link">点击上传</span></div>

        </div>
        <div class="file-list" id="fileList"></div>
        <div class="section-tip" id="uploadTip" style="display:none; color: var(--danger);">请至少上传 1 份佐证材料</div>
      </div>
    </div>

    <!-- Success view -->
    <div class="modal-body success-wrap" id="modalSuccessView" style="display:none;">
      <div class="success-icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>
      <div class="success-title">批量完成提交成功</div>
      <div class="success-desc">所选任务已统一上传佐证材料,系统将自动完成验收</div>
      <div class="success-summary">
        <div class="summary-item">
          <div class="num" id="successCount">6</div>
          <div class="label">完成任务</div>
        </div>
        <div class="summary-item">
          <div class="num" id="successFiles">0</div>
          <div class="label">上传材料</div>
        </div>
        <div class="summary-item">
          <div class="num" id="successTime">0s</div>
          <div class="label">耗时</div>
        </div>
      </div>
    </div>

    <div class="modal-footer" id="modalFooter">
      <button class="btn btn-ghost" id="modalCancel">取消</button>
      <button class="btn btn-primary" id="modalSubmit">确认提交</button>
    </div>
  </div>
</div>

<script>
/* ===== Mock data ===== */
const mockItems = [
  { id: 1, desc: '3号车间消防栓水压不足,无法达到规定喷射距离' },
  { id: 2, desc: '配电房绝缘手套超期未检测,存在触电风险' },
  { id: 3, desc: '危化品仓库通风系统故障,有害气体浓度偏高' },
  { id: 4, desc: '锅炉房压力表读数异常,需立即校验' },
  { id: 5, desc: '原料仓库堆放不规范,部分化学品未分类存放' },
  { id: 6, desc: '消防通道被占用,应急疏散受阻' },
];

let files = [];
const selectedCount = mockItems.length;

/* ===== Init list ===== */
function renderSelectedList() {
  const list = document.getElementById('selectedList');
  list.innerHTML = '';
  mockItems.forEach(item => {
    const chip = document.createElement('div');
    chip.className = 'selected-chip';
    chip.title = item.desc;
    chip.innerHTML = `
      <span class="idx">#${String(item.id).padStart(2, '0')}</span>
      <span class="text">${item.desc}</span>
    `;
    list.appendChild(chip);
  });
}
renderSelectedList();

/* ===== Modal control ===== */
const modalMask = document.getElementById('modalMask');
const formView = document.getElementById('modalFormView');
const successView = document.getElementById('modalSuccessView');
const modalFooter = document.getElementById('modalFooter');

function openModal() {
  resetForm();
  showFormView();
  modalMask.classList.add('open');
}
function closeModal() { modalMask.classList.remove('open'); }

document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalCancel').addEventListener('click', () => {
  if (successView.style.display !== 'none') {
    closeModal();
  } else {
    closeModal();
  }
});
modalMask.addEventListener('click', (e) => { if (e.target === modalMask) closeModal(); });

/* Toggle selected list */
const toggleList = document.getElementById('toggleList');
const selectedListEl = document.getElementById('selectedList');
toggleList.addEventListener('click', () => {
  const collapsed = selectedListEl.classList.toggle('collapsed');
  toggleList.classList.toggle('collapsed', collapsed);
  toggleList.querySelector('span:first-child').textContent = collapsed ? '展开列表' : '收起列表';
});

/* ===== Upload ===== */
const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');
const fileListEl = document.getElementById('fileList');
const uploadTip = document.getElementById('uploadTip');

uploadZone.addEventListener('click', () => fileInput.click());
uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', (e) => {
  e.preventDefault();
  uploadZone.classList.remove('dragover');
  addFiles(e.dataTransfer.files);
});
fileInput.addEventListener('change', (e) => {
  addFiles(e.target.files);
  e.target.value = '';
});

function addFiles(rawFiles) {
  Array.from(rawFiles).forEach(f => {
    if (f.size > 20 * 1024 * 1024) {
      showToast(`${f.name} 超过 20MB 限制`, 'error');
      return;
    }
    const fileObj = {
      id: Date.now() + Math.random(),
      name: f.name,
      size: f.size,
      type: getFileType(f.name),
      progress: 0,
      status: 'uploading',
    };
    files.push(fileObj);
    renderFiles();
    simulateUpload(fileObj);
  });
}

function getFileType(name) {
  const ext = name.split('.').pop().toLowerCase();
  if (['pdf'].includes(ext)) return 'PDF';
  if (['doc', 'docx'].includes(ext)) return 'DOC';
  if (['xls', 'xlsx'].includes(ext)) return 'XLS';
  if (['jpg', 'jpeg', 'png', 'gif'].includes(ext)) return 'IMG';
  return 'FILE';
}

function simulateUpload(f) {
  const interval = setInterval(() => {
    if (f.status === 'removed') { clearInterval(interval); return; }
    f.progress += Math.random() * 18 + 6;
    if (f.progress >= 100) {
      f.progress = 100;
      f.status = 'done';
      clearInterval(interval);
    }
    renderFiles();
  }, 220);
}

function renderFiles() {
  fileListEl.innerHTML = '';
  files.forEach(f => {
    if (f.status === 'removed') return;
    const item = document.createElement('div');
    item.className = `file-item ${f.status === 'done' ? 'done' : ''}`;
    const sizeStr = f.size > 1024 * 1024 ? `${(f.size / 1024 / 1024).toFixed(1)} MB` : `${(f.size / 1024).toFixed(1)} KB`;
    item.innerHTML = `
      <div class="file-icon">${f.type}</div>
      <div class="file-info">
        <div class="file-name">${f.name}</div>
        <div class="file-progress">
          <div class="progress-bar"><div class="fill ${f.status === 'done' ? 'done' : ''}" style="width: ${Math.floor(f.progress)}%"></div></div>
          <span>${f.status === 'done' ? '已上传' : Math.floor(f.progress) + '%'}</span>
          <span style="color: var(--text-3);">${sizeStr}</span>
        </div>
      </div>
      <button class="file-remove" data-id="${f.id}" ${f.status === 'uploading' ? 'disabled' : ''}>×</button>
    `;
    fileListEl.appendChild(item);
  });
  document.querySelectorAll('.file-remove').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = parseFloat(btn.dataset.id);
      const f = files.find(x => x.id === id);
      if (f) f.status = 'removed';
      renderFiles();
    });
  });
}

/* ===== Submit ===== */
document.getElementById('modalSubmit').addEventListener('click', () => {
  const validFiles = files.filter(f => f.status === 'done' && f.status !== 'removed');
  if (validFiles.length === 0) {
    uploadTip.style.display = 'block';
    fileListEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }
  uploadTip.style.display = 'none';

  const start = Date.now();
  const submitBtn = document.getElementById('modalSubmit');
  submitBtn.disabled = true;
  submitBtn.textContent = '提交中...';

  setTimeout(() => {
    const dur = ((Date.now() - start) / 1000 + 1.0).toFixed(1);
    document.getElementById('successCount').textContent = selectedCount;
    document.getElementById('successFiles').textContent = validFiles.length;
    document.getElementById('successTime').textContent = dur + 's';
    showSuccessView();
    submitBtn.disabled = false;
    submitBtn.textContent = '确认提交';

    setTimeout(() => {
      closeModal();
      showToast(`已成功完成 ${selectedCount} 条任务`, 'success');
    }, 2200);
  }, 800);
});

function showFormView() {
  formView.style.display = 'block';
  successView.style.display = 'none';
  modalFooter.style.display = 'flex';
  document.getElementById('modalCancel').textContent = '取消';
  document.getElementById('modalSubmit').style.display = '';
}
function showSuccessView() {
  formView.style.display = 'none';
  successView.style.display = 'block';
  modalFooter.style.display = 'flex';
  document.getElementById('modalCancel').textContent = '关闭';
  document.getElementById('modalSubmit').style.display = 'none';
}

function resetForm() {
  files = [];
  fileListEl.innerHTML = '';
  uploadTip.style.display = 'none';
  selectedListEl.classList.remove('collapsed');
  toggleList.classList.remove('collapsed');
  toggleList.querySelector('span:first-child').textContent = '收起列表';
}

/* ===== Toast ===== */
let toastTimer = null;
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

/* ===== Auto open on load ===== */
openModal();
</script>
</body>
</html>
